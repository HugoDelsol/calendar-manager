services:
  mysql:
    image: mysql:8.0
    container_name: calendar_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestion_rdv
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - calendar_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: calendar_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - calendar_network

volumes:
  mysql_data:

networks:
  calendar_network:
    driver: bridge